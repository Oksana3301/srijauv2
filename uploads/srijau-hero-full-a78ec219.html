<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The future of green is ours. — Srijau</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
:root{
  --wine:#7B2D3F; --forest:#2E6951; --gold:#C89B5C; --gold-soft:#E8C896;
  --cream:#FAF6F0; --charcoal:#1A1612;
  --ease-fade:cubic-bezier(0.22,1,0.36,1);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--charcoal);font-family:'Inter',sans-serif;}
@media (pointer:fine){body{cursor:none;} body *{cursor:none !important;}}

.hero{position:relative;width:100vw;height:100vh;overflow:hidden;background:var(--charcoal);}

/* ---- BG: single complete image, visible by DEFAULT (no JS needed) ---- */
.hero__bg{position:absolute;inset:-4%;z-index:1;will-change:transform;}
.hero__bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  user-select:none;-webkit-user-drag:none;
  animation:kenburns 26s ease-in-out infinite alternate;}
@keyframes kenburns{from{transform:scale(1.0)}to{transform:scale(1.08)}}

/* legibility scrims */
.hero__scrim{position:absolute;inset:0;z-index:2;pointer-events:none;
  background:
    linear-gradient(90deg, rgba(26,22,18,0.62) 0%, rgba(26,22,18,0.18) 38%, transparent 60%),
    linear-gradient(0deg, rgba(26,22,18,0.45) 0%, transparent 30%),
    radial-gradient(120% 80% at 70% 30%, transparent 40%, rgba(26,22,18,0.30) 100%);}

/* ---- NAV: full-width sticky bar, logo left + tabs right ---- */
.nav{position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px clamp(20px,4vw,56px);
  background:linear-gradient(180deg, rgba(26,22,18,0.55) 0%, transparent 100%);
  opacity:0;animation:fadeDown .9s var(--ease-fade) .2s forwards;}
.nav__brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav__logo{width:40px;height:40px;border-radius:11px;display:block;
  box-shadow:0 6px 18px rgba(0,0,0,.35);}
.nav__word{font-family:'Instrument Serif',serif;font-size:26px;color:var(--cream);
  letter-spacing:.01em;line-height:1;}
.nav__links{display:flex;align-items:center;gap:26px;}
.nav__link{font-family:'Instrument Serif',serif;font-size:18px;color:var(--cream);
  text-decoration:none;opacity:.9;transition:opacity .3s,color .3s;}
.nav__link:hover{opacity:1;color:var(--gold-soft);}
.nav__mark{color:var(--gold);font-size:13px;}

/* ---- HERO TEXT ---- */
.hero-text{position:absolute;left:clamp(28px,7vw,120px);top:50%;
  transform:translateY(-50%);z-index:15;max-width:560px;
  opacity:0;animation:fadeUp 1.1s var(--ease-fade) .5s forwards;}
.hero-text__eyebrow{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.24em;color:var(--gold-soft);margin-bottom:22px;text-transform:uppercase;}
.hero-text__title{font-family:'Instrument Serif',serif;font-weight:400;
  font-size:clamp(52px,8.5vw,112px);line-height:.96;color:var(--cream);
  letter-spacing:-.01em;text-shadow:0 4px 50px rgba(0,0,0,.5);}
.hero-text__title .line{display:block;}
.hero-text__title .accent{color:var(--gold);font-style:italic;margin-right:8px;}
.hero-text__subtitle{font-family:'Inter',sans-serif;font-size:clamp(15px,1.4vw,18px);
  font-weight:300;line-height:1.6;color:rgba(250,246,240,.88);margin-top:28px;max-width:440px;
  text-shadow:0 2px 24px rgba(0,0,0,.45);}
.hero-text__cta{display:inline-flex;align-items:center;gap:10px;margin-top:34px;
  padding:14px 28px;border-radius:100px;background:var(--gold);color:var(--charcoal);
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;text-decoration:none;
  transition:transform .35s var(--ease-spring),box-shadow .35s var(--ease-fade);}
.hero-text__cta:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(200,155,92,.4);}
.hero-text__cta span{transition:transform .3s var(--ease-fade);}
.hero-text__cta:hover span{transform:translateX(4px);}

/* ---- CARDS ---- */
.cards{position:absolute;right:clamp(24px,4vw,64px);bottom:clamp(40px,8vh,90px);z-index:18;
  display:flex;flex-direction:column;gap:16px;opacity:0;
  animation:fadeUp .9s var(--ease-fade) .8s forwards;}
.card{position:relative;display:flex;align-items:center;gap:14px;width:262px;padding:18px 22px;
  border-radius:18px;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.22);color:var(--cream);
  text-align:left;
  transition:transform .42s var(--ease-spring),box-shadow .42s var(--ease-spring),
    background .42s var(--ease-fade),opacity .42s var(--ease-fade);}
.card__icon{display:grid;place-items:center;width:38px;height:38px;flex-shrink:0;border-radius:50%;
  background:var(--gold);color:var(--charcoal);font-size:13px;padding-left:2px;}
.card__num{font-family:'Instrument Serif',serif;font-size:38px;line-height:1;color:var(--gold-soft);
  flex-shrink:0;width:40px;text-align:center;}
.card__label{font-family:'Inter',sans-serif;font-size:14px;font-weight:500;line-height:1.3;}
.card:hover{transform:translateY(-15px) scale(1.25);box-shadow:0 30px 60px rgba(0,0,0,.45);
  background:rgba(255,255,255,.22);z-index:10;}
.cards:has(.card:hover) .card:not(:hover){transform:scale(.96);opacity:.7;}

/* ---- CURSOR ---- */
.cursor{position:fixed;top:0;left:0;width:30px;height:30px;margin:-15px 0 0 -15px;
  border:1.5px solid #fff;border-radius:50%;pointer-events:none;z-index:999;
  mix-blend-mode:difference;will-change:transform;
  transition:width .28s var(--ease-spring),height .28s var(--ease-spring),margin .28s var(--ease-spring);}
.cursor.is-hovering{width:50px;height:50px;margin:-25px 0 0 -25px;}
@media (pointer:coarse){.cursor{display:none;}}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.hero-text{animation-name:fadeUpCentered;}
@keyframes fadeUpCentered{from{opacity:0;transform:translateY(calc(-50% + 24px))}to{opacity:1;transform:translateY(-50%)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

@media (max-width:860px){
  .nav__links{gap:14px;}
  .nav__link{font-size:15px;}
  .nav__word{font-size:22px;}
}

@media (max-width:720px){
  .nav{gap:14px;padding:9px 16px;} .nav__link{font-size:15px;}
  .cards{right:14px;bottom:24px;} .card{width:200px;padding:13px 15px;}
}
@media (prefers-reduced-motion:reduce){
  .hero__bg{animation:none;}
  .nav,.hero-text,.cards{animation-duration:.4s;}
}
</style>
</head>

<script>
(function(){
  var coarse = window.matchMedia('(pointer:coarse)').matches;
  var bg = document.querySelector('.hero__bg');
  var cursorEl = document.getElementById('cursor');
  var mx = innerWidth/2, my = innerHeight/2, cx = mx, cy = my, px=0, py=0, tx=0, ty=0;

  if(!coarse){
    addEventListener('mousemove', function(e){ mx=e.clientX; my=e.clientY; }, {passive:true});
    document.querySelectorAll('[data-cursor]').forEach(function(el){
      el.addEventListener('mouseenter', function(){ cursorEl.classList.add('is-hovering'); });
      el.addEventListener('mouseleave', function(){ cursorEl.classList.remove('is-hovering'); });
    });
  }
  function loop(){
    // subtle parallax on the bg (enhancement only; bg already visible without JS)
    tx = -(mx/innerWidth - .5) * 24;
    ty = -(my/innerHeight - .5) * 16;
    px += (tx-px)*.08; py += (ty-py)*.08;
    bg.style.transform = 'translate('+px.toFixed(2)+'px,'+py.toFixed(2)+'px)';
    if(!coarse){
      cx += (mx-cx)*.18; cy += (my-cy)*.18;
      cursorEl.style.transform = 'translate('+cx.toFixed(2)+'px,'+cy.toFixed(2)+'px)';
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
